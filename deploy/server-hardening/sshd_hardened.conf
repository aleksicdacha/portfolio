# =============================================================================
#  /etc/ssh/sshd_config.d/hardened.conf
#
#  Drop-in SSH hardening — Ubuntu 22.04+ reads all *.conf from sshd_config.d/
#  DEPLOY: scp deploy/server-hardening/sshd_hardened.conf \
#               root@SERVER:/etc/ssh/sshd_config.d/hardened.conf
#          ssh root@SERVER "sshd -t && systemctl reload ssh"
# =============================================================================

# ── Authentication ────────────────────────────────────────────────────────────
# Keys only — password auth is the #1 attack vector
PasswordAuthentication no
ChallengeResponseAuthentication no
PermitEmptyPasswords no
KbdInteractiveAuthentication no

# Root can only log in with a key (not blank password)
PermitRootLogin prohibit-password

# Cut off brute-force: disconnect after 3 bad attempts
MaxAuthTries 3
MaxSessions  3

# ── Connection hardening ──────────────────────────────────────────────────────
# Disconnect idle sessions after 10 minutes (2 × 5-min probes)
ClientAliveInterval 300
ClientAliveCountMax 2

# Reject connections that haven't authenticated within 30s
LoginGraceTime 30

# ── Disable unused features ───────────────────────────────────────────────────
X11Forwarding no
AllowAgentForwarding no
AllowTcpForwarding no
PermitTunnel no
PrintMotd no

# ── Allowed users ─────────────────────────────────────────────────────────────
# Only the root user can SSH in (no other local accounts to brute force)
AllowUsers root
