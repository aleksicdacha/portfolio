# =============================================================================
#  /etc/nginx/sites-available/realestate-ip.conf
#
#  Real-Estate monorepo — HTTP only, raw IP (no domain / no TLS)
#  Use this until aleksicdacha.dev DNS is configured and cert issued.
#
#  ┌─────────────────────────────────────────────────────────────────────┐
#  │  App              │  PM2 port  │  Public URL                        │
#  ├─────────────────────────────────────────────────────────────────────┤
#  │  NestJS API       │   :3000    │  http://46.224.231.217:8090        │
#  │  Admin panel      │   :3001    │  http://46.224.231.217:8081        │
#  │  User website     │   :3002    │  http://46.224.231.217:8082        │
#  └─────────────────────────────────────────────────────────────────────┘
#
#  NOTE: port 8080 is reserved by filebrowser app already on this server.
#
#  Requires PM2 processes to be running first:
#    pm2 start apps/api/dist/main.js                        --name realestate-api
#    pm2 start "npm run start --prefix apps/admin-web"      --name realestate-admin
#    pm2 start "npm run start --prefix apps/user-web"       --name realestate-user
# =============================================================================

# ── Upstream blocks ───────────────────────────────────────────────────────────
upstream re_api   { server 127.0.0.1:3000; keepalive 16; }
upstream re_admin { server 127.0.0.1:3001; keepalive 8; }
upstream re_user  { server 127.0.0.1:3002; keepalive 8; }


# =============================================================================
#  1.  NestJS API — port 8090  (8080 is taken by filebrowser)
# =============================================================================
server {
    listen 8090;
    listen [::]:8090;
    server_name _;

    client_max_body_size 50m;
    client_body_timeout  30s;
    keepalive_timeout    65s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Cache-Control          "no-store" always;

    limit_conn addr 30;

    location ~* ^/(wp-admin|wp-login|phpmyadmin|\.env|\.git) {
        deny all; access_log off; log_not_found off;
    }
    location ~ /\. { deny all; access_log off; log_not_found off; }

    # Serve uploaded images directly from disk
    location /uploads/ {
        alias /root/RealEstatesAPI-NestJS/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location / {
        limit_req zone=global burst=40 nodelay;

        proxy_pass         http://re_api;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        proxy_buffering         on;
        proxy_buffer_size       8k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        proxy_intercept_errors on;
        error_page 502 503 504 = @api_down;
    }

    location @api_down {
        default_type application/json;
        return 502 '{"statusCode":502,"message":"API temporarily unavailable"}';
    }

    access_log /var/log/nginx/realestate_api_access.log;
    error_log  /var/log/nginx/realestate_api_error.log warn;
}


# =============================================================================
#  2.  Admin panel (Next.js) — port 8081
# =============================================================================
server {
    listen 8081;
    listen [::]:8081;
    server_name _;

    client_max_body_size 20m;
    keepalive_timeout    65s;

    add_header X-Content-Type-Options "nosniff" always;

    limit_conn addr 20;

    location ~* ^/(wp-admin|wp-login|phpmyadmin|\.env|\.git) {
        deny all; access_log off; log_not_found off;
    }
    location ~ /\. { deny all; access_log off; log_not_found off; }

    location /_next/static/ {
        proxy_pass http://re_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        limit_req zone=global burst=20 nodelay;

        proxy_pass         http://re_admin;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        proxy_intercept_errors on;
        error_page 502 503 504 = @admin_down;
    }

    location @admin_down {
        default_type text/html;
        return 502 '<html><body><h1>Admin panel temporarily unavailable</h1></body></html>';
    }

    access_log /var/log/nginx/realestate_admin_access.log;
    error_log  /var/log/nginx/realestate_admin_error.log warn;
}


# =============================================================================
#  3.  User website (Next.js) — port 8082
# =============================================================================
server {
    listen 8082;
    listen [::]:8082;
    server_name _;

    client_max_body_size 5m;
    keepalive_timeout    65s;

    add_header X-Content-Type-Options "nosniff" always;

    limit_conn addr 40;

    location ~* ^/(wp-admin|wp-login|phpmyadmin|\.env|\.git) {
        deny all; access_log off; log_not_found off;
    }
    location ~ /\. { deny all; access_log off; log_not_found off; }

    location /_next/static/ {
        proxy_pass http://re_user;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        limit_req zone=global burst=60 nodelay;

        proxy_pass         http://re_user;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        proxy_intercept_errors on;
        error_page 502 503 504 = @user_down;
    }

    location @user_down {
        default_type text/html;
        return 502 '<html><body><h1>Site temporarily unavailable</h1></body></html>';
    }

    access_log /var/log/nginx/realestate_user_access.log;
    error_log  /var/log/nginx/realestate_user_error.log warn;
}
