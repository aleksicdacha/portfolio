# =============================================================================
#  /etc/nginx/sites-available/realestate.conf
#
#  Real-Estate Turborepo monorepo — 3 apps proxied via nginx
#  App root: /root/RealEstatesAPI-NestJS
#
#  ┌─────────────────────────────────────────────────────────────────────┐
#  │  App              │  Internal port  │  Public HTTPS port            │
#  ├─────────────────────────────────────────────────────────────────────┤
#  │  NestJS API       │  127.0.0.1:3000 │  aleksicdacha.dev:8443        │
#  │  Admin panel      │  127.0.0.1:3001 │  aleksicdacha.dev:8444        │
#  │  User website     │  127.0.0.1:3002 │  aleksicdacha.dev:8445        │
#  └─────────────────────────────────────────────────────────────────────┘
#
#  Hetzner firewall: open TCP 8090, 8443, 8444, 8081, 8444, 8082, 8445
#  NOTE: port 8080 is taken by filebrowser on this server — do not use it.
#
#  PM2 setup (run once on server after first deploy):
#    cd /root/RealEstatesAPI-NestJS
#    npm ci
#    npm run build                             # builds all 3 apps via turbo
#    pm2 start apps/api/dist/main.js           --name realestate-api
#    pm2 start "npm run start --prefix apps/admin-web" --name realestate-admin
#    pm2 start "npm run start --prefix apps/user-web"  --name realestate-user
#    pm2 startup && pm2 save                   # survive reboots
#
#  After changes:
#    pm2 reload realestate-api
#    pm2 reload realestate-admin
#    pm2 reload realestate-user
# =============================================================================

# ── Upstream blocks ───────────────────────────────────────────────────────────
upstream realestate_api {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream realestate_admin {
    server 127.0.0.1:3001;
    keepalive 8;
}

upstream realestate_user {
    server 127.0.0.1:3002;
    keepalive 8;
}


# =============================================================================
#  1.  NestJS API — port 8443 (HTTPS) / 8080 (HTTP redirect)
# =============================================================================

server {
    listen 8080;
    listen [::]:8080;
    server_name aleksicdacha.dev;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://aleksicdacha.dev:8443$request_uri; }
}

server {
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name aleksicdacha.dev;

    ssl_certificate         /etc/letsencrypt/live/aleksicdacha.dev/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/aleksicdacha.dev/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/aleksicdacha.dev/chain.pem;
    include snippets/ssl-params.conf;

    client_max_body_size  50m;   # API accepts image uploads
    client_body_timeout   30s;
    keepalive_timeout     65s;

    include snippets/security-headers.conf;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;
    add_header Cache-Control           "no-store" always;

    limit_conn addr 30;

    # Block scanner/bot paths
    location ~* ^/(wp-admin|wp-login|phpmyadmin|\.env|\.git) {
        deny all; access_log off; log_not_found off;
    }
    location ~ /\. { deny all; access_log off; log_not_found off; }

    # Serve uploaded images directly from disk (avoids NestJS overhead)
    location /uploads/ {
        alias /root/RealEstatesAPI-NestJS/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options nosniff always;
        access_log off;
    }

    # Reverse proxy → NestJS API
    location / {
        limit_req zone=global burst=40 nodelay;

        proxy_pass         http://realestate_api;
        proxy_http_version 1.1;

        # WebSocket / Socket.IO support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        proxy_buffering         on;
        proxy_buffer_size       8k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        proxy_intercept_errors on;
        error_page 502 503 504 = @api_down;
    }

    location @api_down {
        default_type application/json;
        return 502 '{"statusCode":502,"message":"API temporarily unavailable"}';
    }

    access_log /var/log/nginx/realestate_api_access.log;
    error_log  /var/log/nginx/realestate_api_error.log warn;
}


# =============================================================================
#  2.  Admin panel (Next.js) — port 8444 (HTTPS) / 8081 (HTTP redirect)
# =============================================================================

server {
    listen 8081;
    listen [::]:8081;
    server_name aleksicdacha.dev;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://aleksicdacha.dev:8444$request_uri; }
}

server {
    listen 8444 ssl http2;
    listen [::]:8444 ssl http2;
    server_name aleksicdacha.dev;

    ssl_certificate         /etc/letsencrypt/live/aleksicdacha.dev/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/aleksicdacha.dev/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/aleksicdacha.dev/chain.pem;
    include snippets/ssl-params.conf;

    client_max_body_size  20m;
    client_body_timeout   30s;
    keepalive_timeout     65s;

    include snippets/security-headers.conf;
    # Admin panel may load scripts/styles inline — allow same-origin + Next.js eval
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://aleksicdacha.dev:8443; frame-ancestors 'none';" always;

    limit_conn addr 20;

    location ~* ^/(wp-admin|wp-login|phpmyadmin|\.env|\.git) {
        deny all; access_log off; log_not_found off;
    }
    location ~ /\. { deny all; access_log off; log_not_found off; }

    # Next.js static assets — aggressive cache
    location /_next/static/ {
        proxy_pass http://realestate_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Reverse proxy → Admin Next.js
    location / {
        limit_req zone=global burst=20 nodelay;

        proxy_pass         http://realestate_admin;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        proxy_buffering         on;
        proxy_buffer_size       8k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        proxy_intercept_errors on;
        error_page 502 503 504 = @admin_down;
    }

    location @admin_down {
        default_type text/html;
        return 502 '<html><body><h1>Admin panel temporarily unavailable</h1></body></html>';
    }

    access_log /var/log/nginx/realestate_admin_access.log;
    error_log  /var/log/nginx/realestate_admin_error.log warn;
}


# =============================================================================
#  3.  User website (Next.js) — port 8445 (HTTPS) / 8082 (HTTP redirect)
# =============================================================================

server {
    listen 8082;
    listen [::]:8082;
    server_name aleksicdacha.dev;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://aleksicdacha.dev:8445$request_uri; }
}

server {
    listen 8445 ssl http2;
    listen [::]:8445 ssl http2;
    server_name aleksicdacha.dev;

    ssl_certificate         /etc/letsencrypt/live/aleksicdacha.dev/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/aleksicdacha.dev/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/aleksicdacha.dev/chain.pem;
    include snippets/ssl-params.conf;

    client_max_body_size  5m;
    client_body_timeout   30s;
    keepalive_timeout     65s;

    include snippets/security-headers.conf;
    # Public Next.js site — allows Google Maps, Google Fonts, Gemini chatbot
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://maps.googleapis.com https://maps.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://maps.googleapis.com https://maps.gstatic.com https://aleksicdacha.dev:8443; connect-src 'self' https://aleksicdacha.dev:8443 wss://aleksicdacha.dev:8443 https://maps.googleapis.com https://generativelanguage.googleapis.com; frame-src https://www.google.com; frame-ancestors 'none';" always;

    limit_conn addr 40;

    location ~* ^/(wp-admin|wp-login|phpmyadmin|\.env|\.git) {
        deny all; access_log off; log_not_found off;
    }
    location ~ /\. { deny all; access_log off; log_not_found off; }

    # Next.js static assets — aggressive cache
    location /_next/static/ {
        proxy_pass http://realestate_user;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Reverse proxy → User Next.js
    location / {
        limit_req zone=global burst=60 nodelay;

        proxy_pass         http://realestate_user;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        proxy_buffering         on;
        proxy_buffer_size       8k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        proxy_intercept_errors on;
        error_page 502 503 504 = @user_down;
    }

    location @user_down {
        default_type text/html;
        return 502 '<html><body><h1>Site temporarily unavailable</h1></body></html>';
    }

    access_log /var/log/nginx/realestate_user_access.log;
    error_log  /var/log/nginx/realestate_user_error.log warn;
}
