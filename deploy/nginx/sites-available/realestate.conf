# =============================================================================
#  /etc/nginx/sites-available/realestate.conf
#
#  Real-Estate Turborepo — 3 apps proxied via nginx (plain HTTP, IP-based)
#
#  ┌──────────────────┬─────────────────┬───────────────────────────────┐
#  │  App             │  PM2/Docker port │  Public URL                  │
#  ├──────────────────┼─────────────────┼───────────────────────────────┤
#  │  NestJS API      │  127.0.0.1:3000  │  http://SERVER_IP:8090       │
#  │  Admin panel     │  127.0.0.1:3001  │  http://SERVER_IP:8081       │
#  │  User website    │  127.0.0.1:3002  │  http://SERVER_IP:8082       │
#  └──────────────────┴─────────────────┴───────────────────────────────┘
#
#  UFW: allow 8090, 8081, 8082
# =============================================================================

# ── Upstream blocks ───────────────────────────────────────────────────────────
upstream realestate_api {
    server 127.0.0.1:3000;
    keepalive 16;
    keepalive_requests 1000;
    keepalive_timeout  65s;
}

upstream realestate_admin {
    server 127.0.0.1:3001;
    keepalive 8;
    keepalive_requests 500;
    keepalive_timeout  65s;
}

upstream realestate_user {
    server 127.0.0.1:3002;
    keepalive 8;
    keepalive_requests 500;
    keepalive_timeout  65s;
}


# =============================================================================
#  1.  NestJS API — port 8090
# =============================================================================
server {
    listen 8090;
    listen [::]:8090;

    # API body size: 10MB max (handles newsletter HTML + file upload metadata)
    # Actual file upload size controlled via multer in NestJS (5MB/file)
    client_max_body_size  10m;
    client_body_timeout   30s;
    keepalive_timeout     65s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    add_header Cache-Control          "no-store" always;

    limit_conn addr 30;

    # Block scanner/bot paths
    location ~* ^/(wp-admin|wp-login|phpmyadmin|\.env|\.git) {
        deny all; access_log off; log_not_found off;
    }
    location ~ /\. { deny all; access_log off; log_not_found off; }

    # ── Auth endpoints — extra strict rate limiting (defense-in-depth) ───────
    # NestJS ThrottlerGuard is the second layer; nginx is the first
    location ~* ^/v1/auth/(login|register|forgot-password|reset-password) {
        limit_req zone=auth burst=5 nodelay;
        limit_conn addr 5;

        proxy_pass         http://realestate_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;
    }

    # ── File upload endpoint ──────────────────────────────────────────────────
    location = /v1/upload {
        limit_req zone=upload burst=5 nodelay;
        limit_conn addr 5;

        proxy_pass         http://realestate_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
    }

    # ── Serve uploaded images directly from disk ──────────────────────────────
    location /uploads/ {
        alias /root/RealEstatesAPI-NestJS/uploads/;
        # Force browser to download rather than execute unknown content
        add_header Content-Disposition   "inline" always;
        add_header X-Content-Type-Options "nosniff" always;
        # Only serve image MIME types — block any non-image that slipped through
        if ($request_filename ~* \.(php|pl|py|sh|cgi|exe|bat|cmd|jsp|asp)$) {
            return 403;
        }
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # ── All other API requests ────────────────────────────────────────────────
    location / {
        limit_req zone=api burst=40 nodelay;

        proxy_pass         http://realestate_api;
        proxy_http_version 1.1;

        # WebSocket / Socket.IO support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        proxy_next_upstream       error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 15s;

        proxy_buffering         on;
        proxy_buffer_size       8k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        proxy_intercept_errors on;
        error_page 502 503 504 = @api_down;
    }

    location @api_down {
        default_type application/json;
        return 502 '{"statusCode":502,"message":"API temporarily unavailable"}';
    }

    access_log /var/log/nginx/realestate_api_access.log;
    error_log  /var/log/nginx/realestate_api_error.log warn;
}


# =============================================================================
#  2.  Admin panel (Next.js) — port 8081
# =============================================================================
server {
    listen 8081;
    listen [::]:8081;

    client_max_body_size  20m;
    client_body_timeout   30s;
    keepalive_timeout     65s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;

    limit_conn addr 20;

    location ~* ^/(wp-admin|wp-login|phpmyadmin|\.env|\.git) {
        deny all; access_log off; log_not_found off;
    }
    location ~ /\. { deny all; access_log off; log_not_found off; }

    # Next.js static assets — aggressive cache
    location /_next/static/ {
        proxy_pass http://realestate_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Reverse proxy → Admin Next.js
    location / {
        limit_req zone=global burst=20 nodelay;

        proxy_pass         http://realestate_admin;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        proxy_next_upstream       error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 15s;

        proxy_buffering         on;
        proxy_buffer_size       8k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        proxy_intercept_errors on;
        error_page 502 503 504 = @admin_down;
    }

    location @admin_down {
        default_type text/html;
        return 502 '<html><body><h1>Admin panel temporarily unavailable</h1></body></html>';
    }

    access_log /var/log/nginx/realestate_admin_access.log;
    error_log  /var/log/nginx/realestate_admin_error.log warn;
}


# =============================================================================
#  3.  User website (Next.js) — port 8082
# =============================================================================
server {
    listen 8082;
    listen [::]:8082;

    client_max_body_size  5m;
    client_body_timeout   30s;
    keepalive_timeout     65s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;

    limit_conn addr 40;

    location ~* ^/(wp-admin|wp-login|phpmyadmin|\.env|\.git) {
        deny all; access_log off; log_not_found off;
    }
    location ~ /\. { deny all; access_log off; log_not_found off; }

    # Next.js static assets — aggressive cache
    location /_next/static/ {
        proxy_pass http://realestate_user;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Reverse proxy → User Next.js
    location / {
        limit_req zone=global burst=60 nodelay;

        proxy_pass         http://realestate_user;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        proxy_next_upstream       error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 15s;

        proxy_buffering         on;
        proxy_buffer_size       8k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        proxy_intercept_errors on;
        error_page 502 503 504 = @user_down;
    }

    location @user_down {
        default_type text/html;
        return 502 '<html><body><h1>Site temporarily unavailable</h1></body></html>';
    }

    access_log /var/log/nginx/realestate_user_access.log;
    error_log  /var/log/nginx/realestate_user_error.log warn;
}
