# =============================================================================
#  /etc/nginx/sites-available/portfolio-ip.conf
#
#  Portfolio — HTTP only, raw IP (no domain / no TLS)
#  Use this until aleksicdacha.dev DNS is configured and cert issued.
#
#  Public URL:  http://46.224.231.217
#  Files root:  /root/Portfolio
# =============================================================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;   # match any / raw IP

    root /root/Portfolio;
    index index.html;

    # ── Security headers (no HSTS — HTTP only) ───────────────────────────────
    add_header X-Frame-Options           "DENY"               always;
    add_header X-Content-Type-Options    "nosniff"            always;
    add_header X-XSS-Protection          "1; mode=block"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_conn addr 20;

    # Block scanner/bot paths
    location ~* ^/(wp-admin|wp-login|phpmyadmin|\.env|\.git) {
        deny all; access_log off; log_not_found off;
    }
    location ~ /\. { deny all; access_log off; log_not_found off; }

    # ── Angular hashed bundles — cache forever ────────────────────────────────
    location ~* \.[a-f0-9]+\.(js|css|mjs)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Static assets ─────────────────────────────────────────────────────────
    location ~* \.(ico|png|jpg|jpeg|svg|webp|woff2|woff|ttf|eot|gif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ── Angular SPA fallback ──────────────────────────────────────────────────
    location / {
        limit_req zone=global burst=30 nodelay;
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/portfolio_access.log;
    error_log  /var/log/nginx/portfolio_error.log warn;
}
