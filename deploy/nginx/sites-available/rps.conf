# =============================================================================
#  /etc/nginx/sites-available/rps.conf
#
#  Paper-Rock-Scissors — real-time multiplayer game (Socket.IO + React SPA)
#
#  ┌──────────────────┬──────────────────────┬──────────────────────────────┐
#  │  Service         │  Container port      │  Public URL                  │
#  ├──────────────────┼──────────────────────┼──────────────────────────────┤
#  │  Node server     │  127.0.0.1:3010      │  proxied under /socket.io/   │
#  │  React client    │  127.0.0.1:3011      │  http://46.224.231.217:8091  │
#  └──────────────────┴──────────────────────┴──────────────────────────────┘
#
#  UFW: sudo ufw allow 8091
#  Enable: sudo ln -sf /etc/nginx/sites-available/rps.conf /etc/nginx/sites-enabled/
# =============================================================================

upstream rps_server {
    server 127.0.0.1:3010;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout  65s;
}

upstream rps_client {
    server 127.0.0.1:3011;
    keepalive 8;
    keepalive_requests 500;
    keepalive_timeout  65s;
}

server {
    listen 8091;
    listen [::]:8091;
    server_name _;

    client_max_body_size  1m;
    client_body_timeout   12s;
    keepalive_timeout     65s;

    add_header X-Content-Type-Options "nosniff"                      always;
    add_header X-Frame-Options        "SAMEORIGIN"                   always;
    add_header X-XSS-Protection       "1; mode=block"                always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    limit_conn addr 40;

    # Block scanner/bot paths
    location ~* ^/(wp-admin|wp-login|phpmyadmin|\.env|\.git) {
        deny all; access_log off; log_not_found off;
    }
    location ~ /\. { deny all; access_log off; log_not_found off; }

    # ── Socket.IO — WebSocket upgrade + polling fallback ─────────────────────
    # Must come before the catch-all location / block.
    # proxy_read_timeout is long to keep WebSocket connections alive.
    # proxy_buffering off is required — buffering breaks real-time streaming.
    location /socket.io/ {
        limit_req zone=global burst=120 nodelay;

        proxy_pass         http://rps_server;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_send_timeout     3600s;
        proxy_read_timeout     3600s;   # long-lived WebSocket connections

        proxy_buffering off;            # required for real-time traffic
    }

    # ── Server health check ───────────────────────────────────────────────────
    location = /health {
        proxy_pass         http://rps_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
        add_header Cache-Control "no-store" always;
    }

    # ── React SPA — served from client nginx container ────────────────────────
    location / {
        limit_req zone=global burst=60 nodelay;

        proxy_pass         http://rps_client;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;

        proxy_buffering         on;
        proxy_buffer_size       8k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        proxy_intercept_errors on;
        error_page 502 503 504 = @rps_down;
    }

    location @rps_down {
        default_type text/html;
        return 502 '<html><body><h1>Game temporarily unavailable</h1></body></html>';
    }

    access_log /var/log/nginx/rps_access.log;
    error_log  /var/log/nginx/rps_error.log warn;
}
