# =============================================================================
#  /etc/nginx/sites-available/portfolio.conf
#
#  Portfolio (Angular SPA) — aleksicdacha.dev   Port 443 (HTTPS)
#
#  Server root:  /var/www/portfolio   (dist/portfolio/browser/ from `npm run build`)
#  TLS cert:     /etc/letsencrypt/live/aleksicdacha.dev/  (Let's Encrypt)
#
#  First-time TLS setup:
#    certbot certonly --standalone -d aleksicdacha.dev -d www.aleksicdacha.dev
# =============================================================================

# ── HTTP → HTTPS (apex + www) ─────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name aleksicdacha.dev www.aleksicdacha.dev;

    # ACME challenge for Certbot auto-renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://aleksicdacha.dev$request_uri;
    }
}

# ── www → apex (HTTPS) ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.aleksicdacha.dev;

    ssl_certificate      /etc/letsencrypt/live/aleksicdacha.dev/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/aleksicdacha.dev/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/aleksicdacha.dev/chain.pem;
    include snippets/ssl-params.conf;

    return 301 https://aleksicdacha.dev$request_uri;
}

# ── Main HTTPS server — Portfolio ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aleksicdacha.dev;

    root  /root/Portfolio;
    index index.html;

    # TLS
    ssl_certificate      /etc/letsencrypt/live/aleksicdacha.dev/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/aleksicdacha.dev/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/aleksicdacha.dev/chain.pem;
    include snippets/ssl-params.conf;

    # Request limits
    client_max_body_size   1m;
    keepalive_timeout      15s;

    # Only GET/HEAD (this is a static SPA, no POST endpoints)
    if ($request_method !~ ^(GET|HEAD)$) { return 405; }

    # Security headers
    include snippets/security-headers.conf;

    # CSP — Angular + Google Fonts, mailto contact form, no backend API
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; form-action 'self' mailto:; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; upgrade-insecure-requests;"
        always;

    # Block scanner/bot paths
    location ~* ^/(wp-admin|wp-login|phpmyadmin|admin|xmlrpc\.php|\.env|\.git) {
        deny all; access_log off; log_not_found off;
    }
    location ~ /\. {
        deny all; access_log off; log_not_found off;
    }

    # Rate limiting
    limit_conn addr 20;

    # ── Angular SPA — all routes fall back to index.html ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        limit_req zone=global burst=20 nodelay;

        # No-cache for index.html so hash-busted bundles are always picked up
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        include snippets/security-headers.conf;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; form-action 'self' mailto:; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; upgrade-insecure-requests;"
            always;
    }

    # Hash-named JS/CSS bundles — immutable (Angular outputHashing: all)
    location ~* \.(js|css)$ {
        limit_req zone=assets burst=50 nodelay;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Images, fonts, icons
    location ~* \.(png|jpg|jpeg|gif|webp|avif|svg|ico|woff|woff2|ttf|otf)$ {
        limit_req zone=assets burst=50 nodelay;
        expires 6M;
        add_header Cache-Control "public, max-age=15552000" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    access_log /var/log/nginx/portfolio_access.log;
    error_log  /var/log/nginx/portfolio_error.log warn;
}
