# =============================================================================
#  /etc/nginx/sites-available/portfolio.conf
#
#  Portfolio (Angular SPA) — plain HTTP, IP-based (no domain, no SSL)
#
#  URL:         http://SERVER_IP          (port 80)
#  Server root: /root/Portfolio           (dist/portfolio/browser/)
# =============================================================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root  /root/Portfolio;
    index index.html;

    client_max_body_size   1m;
    keepalive_timeout      15s;

    # Only GET/HEAD (static SPA, no POST endpoints)
    if ($request_method !~ ^(GET|HEAD)$) { return 405; }

    # Security headers (no HSTS — plain HTTP)
    add_header X-Frame-Options        "DENY"          always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin"  always;
    add_header X-XSS-Protection       "1; mode=block" always;

    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; form-action 'self' mailto:; base-uri 'self'; object-src 'none'; frame-ancestors 'none';"
        always;

    # Block scanner/bot paths
    location ~* ^/(wp-admin|wp-login|phpmyadmin|admin|xmlrpc\.php|\.env|\.git) {
        deny all; access_log off; log_not_found off;
    }
    location ~ /\. { deny all; access_log off; log_not_found off; }

    limit_conn addr 20;

    # Angular SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
        limit_req zone=global burst=20 nodelay;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    }

    # Hash-named JS/CSS bundles — immutable
    location ~* \.(js|css)$ {
        limit_req zone=assets burst=50 nodelay;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Images, fonts, icons
    location ~* \.(png|jpg|jpeg|gif|webp|avif|svg|ico|woff|woff2|ttf|otf)$ {
        limit_req zone=assets burst=50 nodelay;
        expires 6M;
        add_header Cache-Control "public, max-age=15552000" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    access_log /var/log/nginx/portfolio_access.log;
    error_log  /var/log/nginx/portfolio_error.log warn;
}
