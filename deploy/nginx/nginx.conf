# =============================================================================
#  /etc/nginx/nginx.conf  –  Global nginx config for aleksicdacha.dev (Hetzner)
#
#  DEPLOY:
#    sudo cp deploy/nginx/nginx.conf          /etc/nginx/nginx.conf
#    sudo cp deploy/nginx/conf.d/*            /etc/nginx/conf.d/
#    sudo cp deploy/nginx/snippets/*          /etc/nginx/snippets/
#    sudo cp deploy/nginx/sites-available/*   /etc/nginx/sites-available/
#    sudo ln -sf /etc/nginx/sites-available/portfolio.conf   /etc/nginx/sites-enabled/
#    sudo ln -sf /etc/nginx/sites-available/realestate.conf  /etc/nginx/sites-enabled/
#    sudo ln -sf /etc/nginx/sites-available/rps.conf         /etc/nginx/sites-enabled/
#    sudo ufw allow 8091
#    sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

user  www-data;
worker_processes  auto;                  # one worker per CPU core
pid   /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections  1024;
    multi_accept on;
    use epoll;
}

http {
    # ── Basics ────────────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    # Hide nginx version from error pages and Server header
    server_tokens off;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/ld+json
        image/svg+xml
        font/woff2;

    # ── Request size limits ────────────────────────────────────────────────────
    client_max_body_size     4m;
    client_body_timeout      12s;
    client_header_timeout    12s;
    send_timeout             10s;

    # ── Rate-limit zones (per-IP) ──────────────────────────────────────────────
    # zone=global  → general page requests
    # zone=assets  → static files (JS/CSS/images) – more relaxed
    # zone=addr    → max simultaneous connections per IP (Slowloris protection)
    include /etc/nginx/conf.d/rate-limiting.conf;

    # ── Include all enabled site configs ──────────────────────────────────────
    include /etc/nginx/sites-enabled/*.conf;
}
