# =============================================================================
#  /etc/nginx/conf.d/rate-limiting.conf
#  Rate-limit zones — must live inside the http {} block (included from nginx.conf)
# =============================================================================

# General page requests — 60 req/min per IP (allows burst of 20)
limit_req_zone  $binary_remote_addr  zone=global:20m  rate=60r/m;

# Static assets (JS/CSS/images/fonts) — more relaxed
limit_req_zone  $binary_remote_addr  zone=assets:20m  rate=300r/m;

# Max simultaneous open connections per IP — Slowloris protection
limit_conn_zone $binary_remote_addr  zone=addr:10m;

# Return 429 Too Many Requests (not default 503)
limit_req_status  429;
limit_conn_status 429;
