name: Daily Security Scan

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches: [master, develop]
    paths:
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read
  security-events: write

jobs:
  npm-audit:
    name: npm audit (dependency vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: npm audit (HIGH + CRITICAL)
        run: npm audit --audit-level=high || true

  codeql:
    name: CodeQL static analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: "javascript-typescript"
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        continue-on-error: true

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: "trivy-results.sarif"

  secret-scan:
    name: Secret leak detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  notify:
    name: Email alert
    runs-on: ubuntu-latest
    needs: [npm-audit, codeql, trivy, secret-scan]
    if: always()
    steps:
      - name: Check for failures
        id: check
        run: |
          FAILED=""
          [[ "${{ needs.npm-audit.result }}"   == "failure" ]] && FAILED="${FAILED}npm-audit "
          [[ "${{ needs.codeql.result }}"       == "failure" ]] && FAILED="${FAILED}codeql "
          [[ "${{ needs.trivy.result }}"        == "failure" ]] && FAILED="${FAILED}trivy "
          [[ "${{ needs.secret-scan.result }}"  == "failure" ]] && FAILED="${FAILED}secret-scan "
          echo "failed_jobs=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "has_failures=$([[ -n "$FAILED" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Check email secret
        id: email_ready
        run: echo "ready=${{ secrets.ALERT_EMAIL_USER != '' && 'true' || 'false' }}" >> "$GITHUB_OUTPUT"

      - name: Send email on failure
        if: steps.check.outputs.has_failures == 'true' && steps.email_ready.outputs.ready == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.ALERT_EMAIL_USER }}
          password: ${{ secrets.ALERT_EMAIL_PASSWORD }}
          subject: "[ALERT] Security scan failures — portfolio — ${{ github.run_id }}"
          to: ${{ secrets.ALERT_EMAIL_USER }}
          from: ${{ secrets.ALERT_EMAIL_USER }}
          body: |
            Security scan detected issues in portfolio repo.

            Failed jobs: ${{ steps.check.outputs.failed_jobs }}
            Repository:  ${{ github.repository }}
            Branch:      ${{ github.ref_name }}
            Commit:      ${{ github.sha }}
            Run URL:     https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
