name: Deploy Portfolio to Hetzner

on:
  push:
    branches:
      - master

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build production bundle ──────────────────────────────────────────
      - name: Build (production)
        run: npm run build:prod

      # ── 5. Configure SSH ────────────────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      # ── 6. Deploy via rsync ─────────────────────────────────────────────────
      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} \
            "mkdir -p /root/Portfolio/dist/portfolio/browser"
          rsync -azv --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            dist/portfolio/browser/ \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:/root/Portfolio/dist/portfolio/browser/

      # ── 7. Fix permissions & reload nginx ───────────────────────────────────
      - name: Fix permissions and reload nginx
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} \
            "chmod 755 /root && chmod -R o+r /root/Portfolio && nginx -t && systemctl reload nginx"
