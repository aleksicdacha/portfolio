<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dalibor Aleksic – Portfolio</title>
  <script>
    // GitHub Pages SPA redirect hack
    // Encodes the path into the query string so the main index.html can parse it
    var segmentCount = 1; // set to 0 for root deploy, 1 for /repo-name deploy
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
